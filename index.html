<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Matrix | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --accent: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #fafafa;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6366f1; }

        .glass-header {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        /* Fixed leftmost column styling */
        .sticky-user-col {
            position: sticky;
            left: 0;
            z-index: 20;
            background-color: #18181b !important;
            border-right: 2px solid #27272a;
        }

        .matrix-container {
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        tr:hover .sticky-user-col {
            background-color: #27272a !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Using inline SVGs to avoid React DOM conflicts caused by lucide.createIcons()
        const Icon = ({ name, size = 18, className = "" }) => {
            const icons = {
                'layout-grid': <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>,
                'trash-2': <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6"/>,
                'download': <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/>,
                'plus-circle': <path d="M12 5v14M5 12h14c0-3.8-3.1-7-7-7s-7 3.2-7 7 3.2 7 7 7"/>,
                'file-text': <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2zM14 2v6h6M10 13h4M10 17h4M10 9h2"/>,
                'x': <path d="M18 6 6 18M6 6l12 12"/>,
                'table': <path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/>,
                'database': (
                    <>
                        <ellipse cx="12" cy="5" rx="9" ry="3"/>
                        <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
                    </>
                ),
                'upload': <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>,
                'info': (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4M12 8h.01"/>
                    </>
                )
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
            if (lines.length === 0) return [];
            const rawHeaders = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim());
                const obj = { _keys: rawHeaders };
                rawHeaders.forEach((header, i) => {
                    obj[header] = values[i];
                    obj[`_norm_${header.toLowerCase()}`] = values[i];
                });
                return obj;
            });
        };

        const downloadCSV = (rows, filename) => {
            const csvContent = rows.map(r => r.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        function App() {
            const [files, setFiles] = useState([]);

            const handleFileUpload = async (e) => {
                const uploadedFiles = Array.from(e.target.files);
                const newFilesData = await Promise.all(
                    uploadedFiles.map(async (file) => {
                        const text = await file.text();
                        const data = parseCSV(text);
                        const dayMatch = file.name.match(/\d+/);
                        const day = dayMatch ? parseInt(dayMatch[0], 10) : 'N/A';
                        return {
                            name: file.name,
                            day: day,
                            data: data,
                            id: Math.random().toString(36).substr(2, 9)
                        };
                    })
                );

                setFiles(prev => [...prev, ...newFilesData].sort((a, b) => {
                    if (a.day === 'N/A') return 1;
                    if (b.day === 'N/A') return -1;
                    return a.day - b.day;
                }));
                // Reset input
                e.target.value = '';
            };

            const consolidated = useMemo(() => {
                if (files.length === 0) return null;
                const userSet = new Set();
                
                const getUserValue = (row) => 
                    row._norm_user || row._norm_username || row._norm_name || row[row._keys[0]];
                
                const getProdValue = (row) => {
                    const explicit = row._norm_results || row._norm_production || row._norm_value || row._norm_count;
                    if (explicit !== undefined) return explicit;
                    return row._keys.length === 2 ? row[row._keys[1]] : '-';
                };

                files.forEach(f => f.data.forEach(row => {
                    const u = getUserValue(row);
                    if (u) userSet.add(u);
                }));

                const uniqueUsers = Array.from(userSet).sort();
                const headerRow = ['User', ...files.map(f => `Day ${f.day}`)];
                
                const rows = uniqueUsers.map(username => {
                    const userRow = [username];
                    files.forEach(file => {
                        const entry = file.data.find(d => getUserValue(d) === username);
                        userRow.push(entry ? getProdValue(entry) : '0');
                    });
                    return userRow;
                });

                return { headerRow, rows };
            }, [files]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="glass-header sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-indigo-600 rounded-lg shadow-lg shadow-indigo-500/20">
                                <Icon name="layout-grid" size={24} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-xl font-extrabold tracking-tight text-white uppercase">
                                    PROD<span className="text-indigo-500">MATRIX</span>
                                </h1>
                                <p className="text-[10px] font-bold text-zinc-500 tracking-widest uppercase">Users x Production</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-4">
                            {files.length > 0 && (
                                <div className="flex items-center gap-2">
                                    <button 
                                        onClick={() => setFiles([])} 
                                        className="p-2 text-zinc-400 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-colors"
                                        title="Clear All"
                                    >
                                        <Icon name="trash-2" size={20} />
                                    </button>
                                    <button 
                                        onClick={() => downloadCSV([consolidated.headerRow, ...consolidated.rows], "production_matrix.csv")} 
                                        className="flex items-center gap-2 bg-zinc-100 hover:bg-white text-zinc-950 px-4 py-2 rounded-lg text-sm font-bold transition-all"
                                    >
                                        <Icon name="download" size={16} /> Export
                                    </button>
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="flex-1 p-6 flex flex-col gap-6 overflow-hidden">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full min-h-0">
                            
                            {/* Upload & Files Sidebar */}
                            <aside className="lg:col-span-3 flex flex-col gap-4">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-5 flex flex-col gap-4">
                                    <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-zinc-700 rounded-xl cursor-pointer hover:bg-zinc-800/50 hover:border-indigo-500/40 transition-all group">
                                        <div className="flex flex-col items-center justify-center">
                                            <Icon name="plus-circle" size={28} className="text-zinc-500 group-hover:text-indigo-400 mb-2 transition-colors" />
                                            <span className="text-sm font-bold text-zinc-400">Add Daily CSVs</span>
                                        </div>
                                        <input type="file" className="hidden" multiple accept=".csv" onChange={handleFileUpload} />
                                    </label>

                                    <div className="flex flex-col gap-2">
                                        <h3 className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mt-2">Loaded Files ({files.length})</h3>
                                        <div className="flex flex-col gap-1.5 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                                            {files.length === 0 ? (
                                                <div className="text-[11px] text-zinc-600 italic py-2">No files uploaded.</div>
                                            ) : (
                                                files.map(f => (
                                                    <div key={f.id} className="flex items-center justify-between p-2.5 bg-zinc-950 rounded-lg border border-zinc-800 group">
                                                        <div className="truncate">
                                                            <p className="text-[11px] font-bold text-zinc-300 truncate">{f.name}</p>
                                                            <p className="text-[9px] text-indigo-500 font-black uppercase">DAY {f.day}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => setFiles(files.filter(x => x.id !== f.id))} 
                                                            className="p-1 text-zinc-700 hover:text-red-500 transition-colors"
                                                        >
                                                            <Icon name="x" size={14} />
                                                        </button>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-indigo-950/20 border border-indigo-900/30 rounded-2xl p-4">
                                    <div className="flex items-center gap-2 text-indigo-400 mb-2">
                                        <Icon name="info" size={16} />
                                        <h4 className="text-xs font-bold uppercase tracking-wider">Analysis Mode</h4>
                                    </div>
                                    <p className="text-[11px] text-indigo-300/70 leading-relaxed">
                                        Matrix mode is active. Left column displays <strong>User identities</strong>. Header rows track <strong>Daily Production</strong> extracted from filenames.
                                    </p>
                                </div>
                            </aside>

                            {/* Data Display */}
                            <div className="lg:col-span-9 min-h-0 flex flex-col">
                                {files.length > 0 ? (
                                    <div className="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden flex flex-col shadow-2xl">
                                        <div className="p-4 border-b border-zinc-800 flex items-center justify-between">
                                            <div className="flex items-center gap-4">
                                                <div className="flex flex-col">
                                                    <span className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Active Matrix</span>
                                                    <span className="text-sm font-bold text-zinc-200">Users x Days</span>
                                                </div>
                                            </div>
                                            <div className="text-xs font-bold bg-zinc-800 px-3 py-1.5 rounded-full text-zinc-400">
                                                {consolidated?.rows.length} rows detected
                                            </div>
                                        </div>

                                        <div className="flex-1 overflow-x-auto overflow-y-auto custom-scrollbar matrix-container">
                                            <table className="w-full text-left border-separate border-spacing-0 min-w-[1200px]">
                                                <thead>
                                                    <tr className="bg-zinc-950/50 sticky top-0 z-40 backdrop-blur-md">
                                                        {consolidated?.headerRow.map((header, i) => (
                                                            <th key={i} className={`p-4 text-[10px] font-black text-zinc-500 uppercase tracking-widest border-b border-zinc-800 ${i === 0 ? 'sticky-user-col text-indigo-400 w-48' : 'text-center w-24'}`}>
                                                                {header}
                                                            </th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-zinc-800/50">
                                                    {consolidated?.rows.map((row, i) => (
                                                        <tr key={i} className="group transition-colors">
                                                            {row.map((cell, j) => (
                                                                <td key={j} className={`p-4 text-xs ${j === 0 ? 'sticky-user-col font-bold text-zinc-200 transition-colors' : 'text-center font-mono text-zinc-400 group-hover:text-zinc-100 group-hover:bg-indigo-500/5'}`}>
                                                                    {cell}
                                                                </td>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-1 flex flex-col items-center justify-center bg-zinc-900/40 rounded-3xl border border-dashed border-zinc-800">
                                        <div className="mb-6 p-10 bg-zinc-900 rounded-full border border-zinc-800 relative shadow-inner">
                                            <Icon name="database" size={48} className="text-zinc-800" />
                                            <div className="absolute inset-0 flex items-center justify-center animate-pulse">
                                                <Icon name="upload" size={24} className="text-zinc-600" />
                                            </div>
                                        </div>
                                        <h2 className="text-lg font-bold text-zinc-400 tracking-tight uppercase">Upload Data Queue</h2>
                                        <p className="text-xs text-zinc-600 mt-2 max-w-xs text-center leading-relaxed font-medium">
                                            Drop your daily performance CSVs to generate a consolidated user-production matrix.
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
